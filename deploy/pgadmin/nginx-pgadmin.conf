# ============================================================================
# Nginx (VPS) — pgAdmin 4 (pgadmin.SEUDOMINIO)
# ----------------------------------------------------------------------------
# Copie para /etc/nginx/sites-available/pgadmin, ajuste server_name e caminhos
# de certificado, faça o symlink e recarregue:
#   sudo ln -s /etc/nginx/sites-available/pgadmin /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS antes:  sudo certbot --nginx -d pgadmin.SEUDOMINIO
# ============================================================================

server {
    listen 443 ssl http2;
    server_name pgadmin.SEUDOMINIO;         # <-- ajuste

    ssl_certificate     /etc/letsencrypt/live/pgadmin.SEUDOMINIO/fullchain.pem; # <-- ajuste
    ssl_certificate_key /etc/letsencrypt/live/pgadmin.SEUDOMINIO/privkey.pem;   # <-- ajuste

    # importar/exportar backups pelo pgAdmin pode subir arquivos grandes
    client_max_body_size 256m;

    location / {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # casa com PROXY_X_PROTO_COUNT=1
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_http_version 1.1;
        proxy_read_timeout 300;

        proxy_pass http://127.0.0.1:5050;   # PGADMIN_PORT (loopback)
    }
}

# ---- Redireciona http -> https -------------------------------------------
server {
    listen 80;
    server_name pgadmin.SEUDOMINIO;         # <-- ajuste
    return 301 https://$host$request_uri;
}
